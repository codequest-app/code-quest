all:
  hosts:
    production:
      ansible_host: "{{ lookup('env', 'DEPLOY_HOST') }}"
      ansible_user: "{{ lookup('env', 'DEPLOY_USER') | default('deploy', true) }}"
      ansible_ssh_private_key_file: "{{ lookup('env', 'DEPLOY_SSH_KEY_FILE') | default('~/.ssh/id_ed25519', true) }}"
  vars:
    app_dir: /srv/code-quest
    domain: "{{ lookup('env', 'DEPLOY_DOMAIN') }}"
    repo_url: "{{ lookup('env', 'DEPLOY_REPO') | default('git@github.com:codequest-app/code-quest.git', true) }}"
