pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,json}"
      exclude:
        - "docs/prototype/**"
      run: pnpm biome check --write {staged_files}
      stage_fixed: true
    typecheck-shared:
      glob: "packages/shared/**/*.ts"
      run: pnpm --filter @code-quest/shared exec tsc --noEmit
    typecheck-server:
      glob: "apps/server/**/*.ts"
      run: pnpm --filter @code-quest/server exec tsc --noEmit
    typecheck-web:
      glob: "apps/web/**/*.{ts,tsx}"
      run: pnpm --filter @code-quest/web exec tsc --noEmit
    typecheck-summoner:
      glob: "apps/summoner/**/*.ts"
      run: pnpm --filter @code-quest/summoner exec tsc --noEmit
    deprecated-web:
      glob: "apps/web/**/*.{ts,tsx}"
      run: node scripts/check-deprecated.mjs apps/web/tsconfig.json {staged_files}
    deprecated-server:
      glob: "apps/server/**/*.ts"
      run: node scripts/check-deprecated.mjs apps/server/tsconfig.json {staged_files}
    deprecated-summoner:
      glob: "apps/summoner/**/*.ts"
      run: node scripts/check-deprecated.mjs apps/summoner/tsconfig.json {staged_files}

pre-push:
  piped: true
  commands:
    knip-db-schema:
      priority: 1
      run: pnpm --filter @code-quest/db-schema exec knip --no-progress
    knip-shared:
      priority: 1
      run: pnpm --filter @code-quest/shared exec knip --no-progress
    knip-summoner:
      priority: 1
      run: pnpm --filter @code-quest/summoner exec knip --no-progress
    knip-server:
      priority: 1
      run: pnpm --filter @code-quest/server exec knip --no-progress
    knip-web:
      priority: 1
      run: pnpm --filter @code-quest/web exec knip --no-progress
    test-shared:
      priority: 2
      run: pnpm --filter @code-quest/shared exec vitest run
    test-server:
      priority: 2
      run: pnpm --filter @code-quest/server exec vitest run
    test-summoner:
      priority: 2
      run: pnpm --filter @code-quest/summoner exec vitest run
    test-web:
      priority: 2
      run: pnpm --filter @code-quest/web exec vitest run
