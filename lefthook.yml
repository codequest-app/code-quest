pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,json}"
      run: pnpm biome check --write {staged_files}
      stage_fixed: true
    typecheck-server:
      glob: "packages/server/**/*.ts"
      run: pnpm --filter server exec tsc --noEmit
    typecheck-client:
      glob: "packages/client/**/*.{ts,tsx}"
      run: pnpm --filter client exec tsc --noEmit
    typecheck-summoner:
      glob: "packages/summoner/**/*.ts"
      run: pnpm --filter @code-quest/summoner exec tsc --noEmit

pre-push:
  parallel: false
  commands:
    test-server:
      run: pnpm --filter server exec vitest run
    test-client:
      run: pnpm --filter client exec vitest run
