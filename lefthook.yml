pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,json}"
      exclude:
        - "docs/prototype/**"
      run: pnpm biome check --write {staged_files}
      stage_fixed: true
    typecheck-shared:
      glob: "packages/shared/**/*.ts"
      run: pnpm --filter @code-quest/shared exec tsc --noEmit
    typecheck-server:
      glob: "packages/server/**/*.ts"
      run: pnpm --filter @code-quest/server exec tsc --noEmit
    typecheck-client:
      glob: "packages/client/**/*.{ts,tsx}"
      run: pnpm --filter @code-quest/client exec tsc --noEmit
    typecheck-summoner:
      glob: "packages/summoner/**/*.ts"
      run: pnpm --filter @code-quest/summoner exec tsc --noEmit
    deprecated-client:
      glob: "packages/client/**/*.{ts,tsx}"
      run: node scripts/check-deprecated.mjs packages/client/tsconfig.json {staged_files}
    deprecated-server:
      glob: "packages/server/**/*.ts"
      run: node scripts/check-deprecated.mjs packages/server/tsconfig.json {staged_files}
    deprecated-summoner:
      glob: "packages/summoner/**/*.ts"
      run: node scripts/check-deprecated.mjs packages/summoner/tsconfig.json {staged_files}

pre-push:
  parallel: true
  commands:
    test-shared:
      run: pnpm --filter @code-quest/shared exec vitest run
    test-server:
      run: pnpm --filter @code-quest/server exec vitest run
    test-summoner:
      run: pnpm --filter @code-quest/summoner exec vitest run
    test-client:
      run: pnpm --filter @code-quest/client exec vitest run
    knip-client:
      run: pnpm --filter @code-quest/client exec knip --no-progress
    knip-server:
      run: pnpm --filter @code-quest/server exec knip --no-progress
    knip-summoner:
      run: pnpm --filter @code-quest/summoner exec knip --no-progress
    knip-shared:
      run: pnpm --filter @code-quest/shared exec knip --no-progress
    knip-db-schema:
      run: pnpm --filter @code-quest/db-schema exec knip --no-progress
