<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Quest Chat</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    #header { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; }
    #header h1 { font-size: 16px; flex: 1; }
    #status { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #e94560; }
    #status.connected { background: #2ecc71; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }

    .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; }
    .msg-wrapper.user { align-self: flex-end; }
    .msg-wrapper.assistant { align-self: flex-start; }
    .msg-wrapper.system { align-self: center; }
    .msg-wrapper.error { align-self: center; }
    .msg-wrapper.thinking { align-self: flex-start; }

    .msg { padding: 10px 14px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.5; cursor: pointer; }
    .msg-wrapper.user .msg { background: #0f3460; }
    .msg-wrapper.assistant .msg { background: #16213e; border: 1px solid #0f3460; }
    .msg-wrapper.system .msg { background: #533483; font-size: 12px; opacity: 0.8; cursor: default; }
    .msg-wrapper.error .msg { background: #e94560; font-size: 12px; cursor: default; }
    .msg-wrapper.thinking .msg { background: #1a1a2e; border: 1px dashed #533483; font-style: italic; opacity: 0.7; }

    .msg:hover { opacity: 0.9; }
    .msg-wrapper.system .msg:hover, .msg-wrapper.error .msg:hover { opacity: 0.8; }

    .raw-detail { display: none; margin-top: 4px; padding: 8px 10px; background: #0d0d1a; border: 1px solid #0f3460; border-radius: 6px; font-family: monospace; font-size: 11px; line-height: 1.4; color: #aaa; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
    .raw-detail.open { display: block; }
    .raw-detail .raw-dir { font-weight: bold; }
    .raw-detail .raw-dir.out { color: #2ecc71; }
    .raw-detail .raw-dir.in { color: #3498db; }
    .raw-detail .raw-dir.err { color: #e94560; }

    #input-area { padding: 12px 16px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; }
    #message-input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 14px; outline: none; resize: none; min-height: 42px; max-height: 150px; }
    #message-input:focus { border-color: #533483; }
    button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
    #send-btn { background: #533483; color: #eee; }
    #send-btn:hover { background: #6a42a0; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #abort-btn { background: #e94560; color: #eee; display: none; }
    #abort-btn:hover { background: #ff6b81; }
    #new-btn { background: #0f3460; color: #eee; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Code Quest Chat</h1>
    <button id="new-btn" onclick="createSession()">New Session</button>
    <span id="status">disconnected</span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
    <button id="abort-btn" onclick="abortSession()">Abort</button>
  </div>

  <script>
    const socket = io();
    let sessionId = null;
    let currentText = '';
    let currentWrapper = null;
    let isProcessing = false;

    // Collect raw events per message for detail view
    let pendingRawEvents = [];

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const abortBtn = document.getElementById('abort-btn');
    const statusEl = document.getElementById('status');

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    socket.on('connect', () => {
      statusEl.textContent = 'connected';
      statusEl.className = 'connected';
      addMessage('Connected to server', 'system');
    });

    socket.on('disconnect', () => {
      statusEl.textContent = 'disconnected';
      statusEl.className = '';
      addMessage('Disconnected from server', 'system');
    });

    socket.on('chat:created', ({ sessionId: id }) => {
      sessionId = id;
      sendBtn.disabled = false;
      addMessage(`Session created: ${id.slice(0, 8)}...`, 'system');
    });

    socket.on('chat:event', ({ event }) => {
      pendingRawEvents.push(event);
      handleEvent(event);
    });

    socket.on('chat:error', ({ message }) => {
      addMessage(`Error: ${message}`, 'error');
      setProcessing(false);
    });

    socket.on('chat:exit', () => {
      addMessage('Session exited', 'system');
      sessionId = null;
      sendBtn.disabled = true;
      setProcessing(false);
    });

    function handleEvent(event) {
      switch (event.type) {
        case 'text':
          if (!currentWrapper) {
            currentWrapper = addMessage('', 'assistant');
            currentText = '';
          }
          currentText += event.content || event.text || '';
          currentWrapper.querySelector('.msg').textContent = currentText;
          // Update raw detail live
          updateRawDetail(currentWrapper);
          messagesEl.scrollTop = messagesEl.scrollHeight;
          break;

        case 'thinking':
          const w = addMessage(event.content || event.thinking || '(thinking...)', 'thinking');
          attachRawEvents(w, [event]);
          break;

        case 'result':
          if (currentWrapper) {
            attachRawEvents(currentWrapper, pendingRawEvents);
          }
          currentWrapper = null;
          currentText = '';
          pendingRawEvents = [];
          setProcessing(false);
          break;

        case 'error':
          addMessage(`Error: ${event.error || JSON.stringify(event)}`, 'error');
          setProcessing(false);
          break;

        case 'tool_use':
          const tw = addMessage(`Tool: ${event.name || 'unknown'}`, 'system');
          attachRawEvents(tw, [event]);
          break;

        case 'init':
          addMessage(`Model: ${event.model} | Tools: ${event.tools?.length ?? 0}`, 'system');
          break;

        case 'tool_result':
          break;

        default:
          console.log('Unhandled event:', event);
      }
    }

    function addMessage(text, type) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper ${type}`;

      const msgEl = document.createElement('div');
      msgEl.className = 'msg';
      msgEl.textContent = text;

      const detailEl = document.createElement('div');
      detailEl.className = 'raw-detail';
      detailEl.textContent = '(no raw data)';

      msgEl.addEventListener('click', () => {
        detailEl.classList.toggle('open');
      });

      wrapper.appendChild(msgEl);
      wrapper.appendChild(detailEl);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrapper;
    }

    function attachRawEvents(wrapper, events) {
      const detailEl = wrapper.querySelector('.raw-detail');
      if (!events.length) return;
      detailEl.innerHTML = events.map(ev => {
        const json = JSON.stringify(ev, null, 2);
        return `<div style="margin-bottom:6px;"><span style="color:#f39c12">${escapeHtml(ev.type)}</span>\n${escapeHtml(json)}</div>`;
      }).join('');
    }

    function updateRawDetail(wrapper) {
      const detailEl = wrapper.querySelector('.raw-detail');
      detailEl.innerHTML = pendingRawEvents.map(ev => {
        const json = JSON.stringify(ev, null, 2);
        return `<div style="margin-bottom:6px;"><span style="color:#f39c12">${escapeHtml(ev.type)}</span>\n${escapeHtml(json)}</div>`;
      }).join('');
    }

    function createSession() {
      socket.emit('chat:create', {}, () => {});
    }

    function sendMessage() {
      const message = inputEl.value.trim();
      if (!message || !sessionId) return;

      addMessage(message, 'user');
      socket.emit('chat:send', { sessionId, message });
      inputEl.value = '';
      inputEl.style.height = 'auto';
      pendingRawEvents = [];
      setProcessing(true);
    }

    function abortSession() {
      if (sessionId) {
        socket.emit('chat:abort', { sessionId });
        setProcessing(false);
      }
    }

    function setProcessing(val) {
      isProcessing = val;
      sendBtn.style.display = val ? 'none' : 'block';
      abortBtn.style.display = val ? 'block' : 'none';
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    socket.on('connect', () => {
      setTimeout(() => createSession(), 500);
    });
  </script>
</body>
</html>
