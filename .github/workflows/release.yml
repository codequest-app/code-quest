name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            summoner: summoner-linux-x64
            bun-target: bun-linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            summoner: summoner-linux-arm64
            bun-target: bun-linux-arm64
          - os: macos-latest
            platform: darwin-arm64
            summoner: summoner-darwin-arm64
            bun-target: bun-darwin-arm64
          - os: windows-latest
            platform: windows-x64
            summoner: summoner-windows-x64.exe
            bun-target: bun-windows-x64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    env:
      PLATFORM: ${{ matrix.platform }}
      SUMMONER_BIN: ${{ matrix.summoner }}
      BUN_TARGET: ${{ matrix.bun-target }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build release
        run: pnpm build:release

      - name: Compile summoner for current platform
        working-directory: apps/summoner
        shell: bash
        run: bun build dist/main.js --compile --target $BUN_TARGET --outfile "dist/$SUMMONER_BIN"

      - name: Package release (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release/server
          cp -r apps/server/dist/* release/server/
          cp apps/server/.env.example release/server/.env.example
          cp scripts/start.sh release/start.sh
          chmod +x release/start.sh
          cp "apps/summoner/dist/$SUMMONER_BIN" release/summoner
          chmod +x release/summoner
          cd release && tar czf "../code-quest-$PLATFORM.tar.gz" .

      - name: Package release (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/server
          Copy-Item -Recurse apps/server/dist/* release/server/
          Copy-Item apps/server/.env.example release/server/.env.example
          Copy-Item scripts/start.bat release/start.bat
          Copy-Item "apps/summoner/dist/$env:SUMMONER_BIN" release/summoner.exe
          Compress-Archive -Path release/* -DestinationPath "code-quest-$env:PLATFORM.zip"

      - name: Generate checksums
        shell: bash
        run: |
          for f in code-quest-*; do
            sha256sum "$f" >> "checksums-$PLATFORM.txt"
          done

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          repository: codequest-app/release
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: latest
          name: Code Quest (latest)
          files: |
            code-quest-*.tar.gz
            code-quest-*.zip
            checksums-*.txt
          make_latest: true
