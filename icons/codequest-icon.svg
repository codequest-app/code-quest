<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F172A"/>
      <stop offset="55%"  stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="15%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <text
    x="256" y="324"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="228"
    font-weight="800"
    letter-spacing="-12"
  >
    <tspan fill="#93C5FD" opacity="0.85">&lt;</tspan><tspan fill="#FFFFFF">Q</tspan><tspan fill="#93C5FD" opacity="0.85">&gt;</tspan>
  </text>

  <rect width="512" height="512" rx="96" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.10"/>
